<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://autobot-webapp-dev.gryd.in https://autnongageleadoperations.jennyjosephofc1.workers.dev http://localhost:3456; form-action 'self'; base-uri 'self'; object-src 'none';" />
  <script>
    (function() {
      var t = localStorage.getItem('jejo-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <title>Sign In — AutoNage</title>
  <link rel="stylesheet" href="assets/fonts/fonts.css" />
  <link rel="stylesheet" href="assets/styles/login.css" />
  <script src="assets/js/lib/theme.js"></script>
  <script src="config.js?v=20260610"></script>
  <script src="config.staging.js?v=20260616"></script>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <svg class="icon-moon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
    <svg class="icon-sun" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
  </button>

  <div class="login-container">
    <div class="login-card">
      <a class="brand-mark" href="index.html" aria-label="Home">
        <img src="assets/images/AN Dark.png" data-light-logo="assets/images/AN.png" data-dark-logo="assets/images/AN Dark.png" alt="AutoNage" />
      </a>

      <!-- Login form -->
      <div id="loginForm">
        <div class="login-title">Welcome back</div>
        <div class="login-subtitle">Sign in with your autoNgage account</div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginFormElement" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="userId">Email or User ID</label>
            <input class="form-input" id="userId" type="text" placeholder="dealership@iamdave.ai" autocomplete="username" spellcheck="false" />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="password-wrapper">
              <input class="form-input" id="password" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password" />
              <button class="password-toggle" type="button" onclick="togglePassword()" aria-label="Toggle password">
                <svg id="eyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>

          <button class="btn-login" id="btnLogin" type="submit">
            <span class="spinner"></span>
            <span id="btnText">Sign In</span>
          </button>
        </form>

        <div class="session-info" id="sessionInfo"></div>
      </div>


    </div>
  </div>

<script>
var CONFIG = window.JEJO_CONFIG || {};
var GRYD_ENDPOINT = CONFIG.grydEndpoint || 'https://autobot-webapp-dev.gryd.in';
var GRYD_SIGNUP_TOKEN = CONFIG.grydSignupToken || '';

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str || ''));
  return div.innerHTML;
}

function togglePassword() {
  var pwd = document.getElementById('password');
  var icon = document.getElementById('eyeIcon');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><path stroke-linecap="round" stroke-linejoin="round" d="M1 1l22 22"/>';
  } else {
    pwd.type = 'password';
    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
  }
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 5000);
}

function setLoading(loading) {
  var btn = document.getElementById('btnLogin');
  var txt = document.getElementById('btnText');
  if (loading) {
    btn.classList.add('loading');
    btn.disabled = true;
    txt.textContent = 'Signing in\u2026';
  } else {
    btn.classList.remove('loading');
    btn.disabled = false;
    txt.textContent = 'Sign In';
  }
}

function updateSessionInfo() {
  var expiry = sessionStorage.getItem('gryd_expiry');
  var el = document.getElementById('sessionInfo');
  if (expiry) {
    var now = Math.floor(Date.now() / 1000);
    var remaining = parseInt(expiry) - now;
    if (remaining > 0) {
      var hours = Math.floor(remaining / 3600);
      var mins = Math.floor((remaining % 3600) / 60);
      el.innerHTML = 'Session expires in <span class="valid">' + hours + 'h ' + mins + 'm</span>';
    } else {
      el.innerHTML = 'Session expired. <span class="invalid">Sign in again.</span>';
    }
  } else {
    el.innerHTML = '';
  }
}

function checkSession() {
  var token = sessionStorage.getItem('gryd_token');
  var expiry = sessionStorage.getItem('gryd_expiry');
  if (token && expiry) {
    if (parseInt(expiry) > Math.floor(Date.now() / 1000)) {
      // Already logged in — skip the login page entirely
      window.location.replace('index.html');
      return true;
    }
  }
  return false;
}

async function handleLogin(event) {
  if (event) event.preventDefault();

  var userId = document.getElementById('userId').value.trim();
  var password = document.getElementById('password').value;

  if (!userId) { showError('Please enter your email or user ID.'); return; }
  if (!password) { showError('Please enter your password.'); return; }

  setLoading(true);

  try {
    var response = await fetch(GRYD_ENDPOINT + '/gryd/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-GRYD-ENTERPRISE-ID': 'autocrm',
        'X-GRYD-SIGNUP-TOKEN': GRYD_SIGNUP_TOKEN
      },
      body: JSON.stringify({
        user_id: userId,
        password: password,
        role: 'human_agent',
        attribute: 'email',
        application_id: 'autocrm'
      })
    });

    var data = await response.json();

    if (!response.ok) {
      showError(data.error || data.message || 'Login failed. Check your credentials.');
      setLoading(false);
      return;
    }

    // Validate response before persisting
    if (!data.token || !data.expiry || parseInt(data.expiry) <= 0) {
      showError('Invalid server response: missing token or expiry.');
      setLoading(false);
      return;
    }

    sessionStorage.setItem('gryd_token', data.token);
    sessionStorage.setItem('gryd_session_id', data.session_id || '');
    sessionStorage.setItem('gryd_enterprise_id', data.enterprise_id || 'autocrm');
    sessionStorage.setItem('gryd_user_id', data.user_id || userId);
    sessionStorage.setItem('gryd_expiry', String(data.expiry));

    // Show flash and redirect after a moment
    var loginForm = document.getElementById('loginForm');
    var btn = document.getElementById('btnLogin');
    btn.classList.remove('loading');
    btn.disabled = false;

    // Replace form with a brief success flash
    loginForm.innerHTML = '<div class="flash-success"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> Signed in as ' + escapeHtml(data.user_id || userId) + ' — redirecting&hellip;</div>';

    setTimeout(function() {
      window.location.replace('index.html');
    }, 1200);
  } catch (err) {
    showError('Network error: ' + err.message);
  }

  setLoading(false);
}

applyTheme(localStorage.getItem('jejo-theme') || 'dark');
if (!checkSession()) { updateSessionInfo(); }
</script>
</body>
</html>
